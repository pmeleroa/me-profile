<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Two team circles overlapping (Venn diagram style) -->
  <circle cx="24" cy="32" r="18" stroke="#FC8181" stroke-width="2" fill="#FC8181" opacity="0.1"/>
  <circle cx="40" cy="32" r="18" stroke="#63B3ED" stroke-width="2" fill="#63B3ED" opacity="0.1"/>
  <!-- People in left team -->
  <circle cx="16" cy="28" r="3" fill="#FC8181" opacity="0.6"/>
  <circle cx="16" cy="38" r="3" fill="#FC8181" opacity="0.6"/>
  <!-- People in right team -->
  <circle cx="48" cy="28" r="3" fill="#63B3ED" opacity="0.6"/>
  <circle cx="48" cy="38" r="3" fill="#63B3ED" opacity="0.6"/>
  <!-- Overlap area - collaboration -->
  <path d="M32 20 L36 28 L32 32 L28 28Z" fill="#D6BCFA" opacity="0.6"/>
  <path d="M32 44 L36 36 L32 32 L28 36Z" fill="#D6BCFA" opacity="0.6"/>
  <!-- Arrows showing collaboration -->
  <path d="M22 30 L28 30" stroke="#FC8181" stroke-width="1.5" stroke-linecap="round" marker-end="none" opacity="0.7"/>
  <path d="M36 30 L42 30" stroke="#63B3ED" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
